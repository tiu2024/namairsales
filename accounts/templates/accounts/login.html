<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish — NamAirSales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B3A6B;
      --navy-light: #254d8f;
      --crimson: #DC2626;
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --border: #E2E8F0;
      --text: #1E293B;
      --text-muted: #64748B;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--navy);
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .login-logo-mark svg {
      width: 26px;
      height: 26px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .login-logo h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: -0.01em;
    }

    .login-logo p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px;
    }

    .field:last-of-type {
      margin-bottom: 0;
    }

    .field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .field input {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      outline: none;
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(27, 58, 107, 0.08);
    }

    .field input.has-error {
      border-color: var(--crimson);
    }

    .field input[type="tel"] {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .error-msg {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--crimson);
      margin-bottom: 16px;
    }

    .btn-login {
      display: block;
      width: 100%;
      padding: 11px;
      margin-top: 20px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-login:hover { background: var(--navy-light); }
    .btn-login:active { background: #152e55; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-logo">
      <div class="login-logo-mark">
        <!-- airplane icon -->
        <svg viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.58 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.48 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.45a16 16 0 0 0 5.65 5.65l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92Z"/>
        </svg>
      </div>
      <h1>NamAirSales</h1>
      <p>Savdo boshqaruv tizimi</p>
    </div>

    <div class="login-card">
      {% if form.non_field_errors %}
        <div class="error-msg">
          Telefon raqam yoki parol noto'g'ri.
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="field">
          <label for="id_username">Telefon raqam</label>
          <input
            type="tel"
            id="id_username"
            name="username"
            placeholder="901234567"
            value="{{ form.username.value|default:'' }}"
            autofocus
            autocomplete="tel"
            class="{% if form.username.errors %}has-error{% endif %}"
          >
        </div>

        <div class="field">
          <label for="id_password">Parol</label>
          <input
            type="password"
            id="id_password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            class="{% if form.password.errors %}has-error{% endif %}"
          >
        </div>

        <button type="submit" class="btn-login">Kirish</button>
      </form>
    </div>
  </div>
</body>
</html>

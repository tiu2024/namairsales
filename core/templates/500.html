<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 — Xatolik yuz berdi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F0F4F8;
      color: #0F172A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border: 1px solid #D1DCE8;
      border-radius: 12px;
      padding: 48px 40px;
      text-align: center;
      max-width: 380px;
    }
    .code { font-size: 64px; font-weight: 600; color: #DC2626; line-height: 1; }
    .title { font-size: 18px; font-weight: 600; margin: 16px 0 8px; }
    .desc { font-size: 14px; color: #64748B; }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 20px;
      background: #1B3A6B;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">500</div>
    <div class="title">Server xatosi</div>
    <p class="desc">Kutilmagan xatolik yuz berdi. Administrator bilan bog'laning.</p>
    <a href="/" class="btn">Bosh sahifaga qaytish</a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NamAirSales{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B3A6B;
      --navy-light: #254d8f;
      --emerald: #059669;
      --crimson: #DC2626;
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --border: #E2E8F0;
      --text: #1E293B;
      --text-muted: #64748B;
      --sidebar-w: 240px;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--navy);
      color: #fff;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow: hidden;
    }

    .sidebar-logo {
      padding: 20px 20px 16px;
      font-size: 16px;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap;
    }

    .sidebar-nav {
      flex: 1;
      padding: 12px 0;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    .sidebar-footer a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
    }
    .sidebar-footer a:hover { color: #fff; }

    /* ── Main content ── */
    .main-content {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 32px;
      min-width: 0;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--navy);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    .btn-primary {
      background: var(--navy);
      color: #fff;
    }
    .btn-primary:hover { background: var(--navy-light); }

    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }

    /* ── Form card ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .form-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .form-card-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--navy);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid .full-width { grid-column: 1 / -1; }

    .field { display: flex; flex-direction: column; gap: 4px; }

    .field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .field input,
    .field select,
    .field textarea {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      width: 100%;
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--navy);
    }

    .field--error input,
    .field--error select,
    .field--error textarea {
      border-color: var(--crimson);
    }

    .field-error {
      font-size: 12px;
      color: var(--crimson);
    }

    /* ── Radio group (segmented) ── */
    .radio-group {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .radio-group label {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-right: 1px solid var(--border);
      transition: background 0.15s, color 0.15s;
    }
    .radio-group label:last-child { border-right: none; }

    .radio-group input[type="radio"] { display: none; }

    .radio-group input[type="radio"]:checked + span {
      /* handled via Alpine or :has — use JS fallback */
    }

    .radio-option { display: contents; }
    .radio-option input[type="radio"]:checked ~ .radio-label {
      background: var(--navy);
      color: #fff;
    }

    /* Simpler approach: use Alpine for active state */
    .seg-btn {
      flex: 1;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-right: 1px solid var(--border);
      transition: background 0.15s, color 0.15s;
    }
    .seg-btn:last-child { border-right: none; }
    .seg-btn.active,
    .seg-btn[aria-pressed="true"] {
      background: var(--navy);
      color: #fff;
    }

    /* price+currency inline */
    .price-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }
    .price-row select { width: auto; }

    /* ── Form actions ── */
    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* ── Table ── */
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background: #F1F5F9;
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #F8FAFC; }

    .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 0;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge--linked {
      background: #D1FAE5;
      color: var(--emerald);
    }

    .badge--pending {
      background: #FEE2E2;
      color: var(--crimson);
    }

    /* ── Tablet collapse ── */
    @media (max-width: 900px) {
      :root { --sidebar-w: 60px; }
      .sidebar-logo span,
      .sidebar-nav a span,
      .sidebar-footer { display: none; }
      .sidebar-nav a { justify-content: center; padding: 12px; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span>NamAirSales</span>
    </div>
    <nav class="sidebar-nav">
      <a href="{% url 'core:salesman_sales' %}" {% if request.resolver_match.url_name == 'salesman_sales' %}class="active"{% endif %}>
        <span>Sotuvlarim</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      {{ request.user.get_full_name|default:request.user.phone_number }}<br>
      <a href="{% url 'accounts:logout' %}">Chiqish</a>
    </div>
  </aside>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- flatpickr JS -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    function initFlatpickr() {
      document.querySelectorAll("[data-flatpickr]").forEach(function(el) {
        if (!el._flatpickr) {
          flatpickr(el, { dateFormat: "d.m.Y", defaultDate: "today" });
        }
      });
    }
    document.addEventListener("DOMContentLoaded", initFlatpickr);
    document.addEventListener("htmx:afterSwap", initFlatpickr);
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
